            <input id="searchInput" type="search" placeholder="Например: Cat.6, RJ-45, лючок" autocomplete="off" />
          </label>
          <div class="tool-row">
            <label>Категория<select id="categoryFilter"></select></label>
            <label>Подкатегория<select id="subcategoryFilter"></select></label>
            <label>Наличие<select id="statusFilter"></select></label>
            <label>Ед. изм.<select id="unitFilter"></select></label>
          </div>
        </div>

        <div class="catalog-summary" id="catalogSummary"></div>
        <div class="product-grid" id="productGrid"></div>
