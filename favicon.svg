    <main id="main-content">
      <section class="page-hero">
        <p class="eyebrow">Каталог продукции</p>
        <h1>Nexus для СКС и инфраструктуры объекта</h1>
        <p>
          Стартовая матрица загружена из Excel и очищена для публичного каталога: без закупочных цен,
          маржи, себестоимости и внутренних комментариев.
        </p>
