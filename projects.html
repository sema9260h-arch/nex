<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Регистрация партнёра - Nexus</title>
    <meta name="description" content="Заявка на партнёрский доступ Nexus для просмотра цен и остатков." />
    <link rel="stylesheet" href="styles.css?v=20260528" />
  </head>
  <body>
    <header class="site-header" id="top">
      <a class="brand" href="index.html"><span class="brand-mark">N</span><span>Nexus</span></a>
      <button class="icon-button menu-toggle" type="button" aria-label="Открыть меню" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="main-nav">
        <a href="catalog.html">Каталог</a><a href="about.html">О бренде</a><a href="projects.html">Проекты</a><a href="certificates.html">Документы</a><a href="partners.html">Партнёрам</a><a href="contacts.html">Контакты</a>
      </nav>
      <a class="header-action" href="request.html">Получить КП <span class="cart-count">0</span></a>
    </header>
    <main>
      <section class="page-hero compact-hero">
        <p class="eyebrow">Партнёрский доступ</p>
        <h1>Регистрация партнёра Nexus</h1>
        <p>После модерации компании администратор откроет цены, остатки и партнёрские условия.</p>
      </section>
      <section class="section">
        <form class="lead-form" id="partnerRegisterForm">
          <label>Компания *<input name="company" required autocomplete="organization" /></label>
          <label>БИН *<input name="bin" required inputmode="numeric" /></label>
          <label>Контактное лицо *<input name="name" required autocomplete="name" /></label>
          <label>Телефон *<input name="phone" required autocomplete="tel" /></label>
          <label>Email *<input name="email" type="email" required autocomplete="email" /></label>
          <label>Пароль *<input name="password" type="password" required autocomplete="new-password" /></label>
          <label>Город<input name="city" autocomplete="address-level2" /></label>
          <label>Направление деятельности<input name="direction" placeholder="Дилер, монтаж, проектирование" /></label>
          <label class="span-2">Комментарий<textarea name="comment" rows="4" placeholder="Какие линейки Nexus интересуют, есть ли объект или спецификация"></textarea></label>
          <button class="button button-primary span-2" type="submit">Отправить на модерацию</button>
        </form>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="data/products.js?v=20260528"></script><script src="app.js?v=20260528"></script>
  </body>
</html>
